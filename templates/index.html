<!DOCTYPE html>
<html>
<head>
    <title>Obsidian Vault Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #282c34;
            color: #e5e5e5;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 350px; /* Wider navigation sidebar */
            background-color: #1e1e1e;
            overflow-y: auto;
            padding: 10px;
            border-right: 2px solid #444;
            overflow-x: hidden; /* Disable horizontal scrolling */
        }
        #content {
            flex: 1;
            padding: 20px;
            background-color: #282c34;
            overflow-y: auto;
        }
        .file-link, .directory-link {
            color: #61dafb;
            margin: 5px 0;
            display: block;
            text-decoration: none;
        }
        .file-link:hover, .directory-link:hover {
            text-decoration: underline;
        }
        .directory-link {
            color: #a8e0ff;
        }
        .folder {
            margin-left: 20px;
        }
        .hidden {
            display: none;
        }
        button {
            margin: 3px;
            padding: 5px 10px;
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 3px;
        }
        button:hover {
            background-color: #777;
        }
        #downloadAllButton {
            background-color: #61dafb;
            margin-bottom: 20px;
            display: block;
            text-align: center;
            padding-top: 10px;
            padding-bottom: 10px;
            width: 100%;
        }
        .markdown-content {
            white-space: pre-wrap;
        }

        /* Styling for code blocks */
        pre {
            background-color: #333;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            color: #dcdcdc;
        }
        code {
            color: #f8f8f2;
            background-color: #333;
            padding: 2px 4px;
            border-radius: 3px;
        }

        /* Copy button for code blocks */
        .copy-btn {
            background-color: #61dafb;
            color: #000;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            border-radius: 3px;
            margin-left: 10px;
        }
        .copy-btn:hover {
            background-color: #4a90e2;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Obsidian Vault</h2>
        <a href="/download_all" id="downloadAllButton">
            <button>Download All</button>
        </a>

        <h3>Root Files</h3>
        {% for file in root_files %}
            <a href="#" class="file-link" onclick="loadFile('{{ file }}')">{{ file }}</a>
            <a href="{{ url_for('download_file', filename=file) }}">
                <button>Download</button>
            </a>
        {% endfor %}

        <h3>Directories</h3>
        {% for rel_dir, dirs, files in directory_structure %}
            <div>
                <span onclick="toggleFolder('{{ rel_dir }}')" class="directory-link">&#x25B6; {{ rel_dir }}</span>
                <a href="{{ url_for('download_directory', dirname=rel_dir) }}">
                    <button>Download</button>
                </a>
                <div id="{{ rel_dir }}" class="folder hidden">
                    {% for file in files %}
                        <a href="#" class="file-link" onclick="loadFile('{{ rel_dir }}/{{ file }}')">{{ file }}</a>
                        <a href="{{ url_for('download_file', filename=rel_dir + '/' + file) }}">
                            <button>Download</button>
                        </a>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}
    </div>
    <div id="content">
        <h2>File Viewer</h2>
        <div id="fileContent" class="markdown-content">Select a file to view its content.</div>
    </div>

    <script>
        function toggleFolder(folderId) {
            const folder = document.getElementById(folderId);
            folder.classList.toggle('hidden');
        }

        function loadFile(filename) {
            fetch(`/view/${filename}`)
                .then(response => response.json())
                .then(data => {
                    const contentDiv = document.getElementById('fileContent');
                    if (data.error) {
                        contentDiv.innerHTML = `<pre>Error: ${data.error}</pre>`;
                    } else {
                        contentDiv.innerHTML = data.content;
                        // Add copy buttons to code blocks
                        const codeBlocks = contentDiv.querySelectorAll('pre code');
                        codeBlocks.forEach(codeBlock => {
                            const copyButton = document.createElement('button');
                            copyButton.classList.add('copy-btn');
                            copyButton.textContent = 'Copy';
                            copyButton.onclick = () => copyToClipboard(codeBlock.textContent);
                            codeBlock.parentElement.appendChild(copyButton);
                        });
                    }
                })
                .catch(err => {
                    document.getElementById('fileContent').innerHTML = `<pre>Error loading file: ${err}</pre>`;
                });
        }

        function copyToClipboard(text) {
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = text;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);
            alert('Code copied to clipboard!');
        }
    </script>
</body>
</html>
