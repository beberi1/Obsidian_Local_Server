<!DOCTYPE html>
<html>
<head>
    <title>Obsidian Vault Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #282c34;
            color: #e5e5e5;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 350px; /* Wider navigation sidebar */
            background-color: #1e1e1e;
            overflow-y: auto;
            padding: 10px;
            border-right: 2px solid #444;
        }
        #content {
            flex: 1;
            padding: 20px;
            background-color: #282c34;
            overflow-y: auto;
        }
        .file-link, .directory-link {
            color: #61dafb;
            margin: 5px 0;
            display: block;
            text-decoration: none;
        }
        .file-link:hover, .directory-link:hover {
            text-decoration: underline;
        }
        .directory-link {
            color: #a8e0ff;
        }
        .folder {
            margin-left: 20px;
        }
        .hidden {
            display: none;
        }
        button {
            margin: 3px;
            padding: 5px 10px;
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 3px;
        }
        button:hover {
            background-color: #777;
        }
        #downloadAllButton {
            background-color: #61dafb;
            margin-bottom: 20px;
            display: block;
            text-align: center;
            padding: 10px;
            width: 100%;
        }
        .markdown-content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Obsidian Vault</h2>
        <a href="/download_all" id="downloadAllButton">
            <button>Download All</button>
        </a>

        <h3>Root Files</h3>
        {% for file in root_files %}
            <a href="#" class="file-link" onclick="loadFile('{{ file }}')">{{ file }}</a>
            <a href="{{ url_for('download_file', filename=file) }}">
                <button>Download</button>
            </a>
        {% endfor %}

        <h3>Directories</h3>
        {% for rel_dir, dirs, files in directory_structure %}
            <div>
                <span onclick="toggleFolder('{{ rel_dir }}')" class="directory-link">&#x25B6; {{ rel_dir }}</span>
                <a href="{{ url_for('download_directory', dirname=rel_dir) }}">
                    <button>Download</button>
                </a>
                <div id="{{ rel_dir }}" class="folder hidden">
                    {% for file in files %}
                        <a href="#" class="file-link" onclick="loadFile('{{ rel_dir }}/{{ file }}')">{{ file }}</a>
                        <a href="{{ url_for('download_file', filename=rel_dir + '/' + file) }}">
                            <button>Download</button>
                        </a>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}
    </div>
    <div id="content">
        <h2>File Viewer</h2>
        <div id="fileContent" class="markdown-content">Select a file to view its content.</div>
    </div>

    <script>
        function toggleFolder(folderId) {
            const folder = document.getElementById(folderId);
            folder.classList.toggle('hidden');
        }

        function loadFile(filename) {
            fetch(`/view/${filename}`)
                .then(response => response.json())
                .then(data => {
                    const contentDiv = document.getElementById('fileContent');
                    if (data.error) {
                        contentDiv.innerHTML = `<pre>Error: ${data.error}</pre>`;
                    } else {
                        contentDiv.innerHTML = data.content;
                    }
                })
                .catch(err => {
                    document.getElementById('fileContent').innerHTML = `<pre>Error loading file: ${err}</pre>`;
                });
        }
    </script>
</body>
</html>
